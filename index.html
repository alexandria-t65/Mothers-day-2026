<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mother's Day Card</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@500&family=Playfair+Display&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background: linear-gradient(#f7efe5, #f1e3d3);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: 'Playfair Display', serif;
}

.card-wrapper {
    perspective: 1500px;
    width: 92vw;
    max-width: 400px;
}

.card {
    width: 100%;
    aspect-ratio: 7 / 10;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(.4, .2, .2, 1);
}

.card.flipped {
    transform: rotateY(180deg);
}

.side {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    overflow: hidden;
    backface-visibility: hidden;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
}

/* FRONT */
.front img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.hint {
    position: absolute;
    bottom: 12px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    color: rgba(0,0,0,0.4);
}

/* BACK */
.back {
    background: #f3e7d9;
    transform: rotateY(180deg);
    padding: 24px;
    box-sizing: border-box;
    display: flex;
    align-items: center;
    justify-content: center;
}

.poem {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(16px, 4.5vw, 22px);
    line-height: 1.7;
    color: #5a3e36;
    text-align: center;
    white-space: pre-line;
}

/* typing cursor */
.cursor {
    display: inline-block;
    width: 2px;
    background: #5a3e36;
    margin-left: 3px;
    animation: blink 1s infinite;
}

@keyframes blink {
    0%, 50%, 100% { opacity: 1; }
    25%, 75% { opacity: 0; }
}
</style>
</head>

<body>

<div class="card-wrapper">
    <div class="card" id="card">

        <!-- FRONT -->
        <div class="side front">
            <img src="front.jpg" alt="Mother's Day">
            <div class="hint">Tap or swipe →</div>
        </div>

        <!-- BACK -->
        <div class="side back">
            <div class="poem" id="poem"></div>
        </div>

    </div>
</div>

<script>
const card = document.getElementById("card");
const poemEl = document.getElementById("poem");

// Tap
card.addEventListener("click", () => {
    flipCard();
});

// Swipe
let startX = 0;

card.addEventListener("touchstart", e => {
    startX = e.touches[0].clientX;
});

card.addEventListener("touchend", e => {
    let diff = e.changedTouches[0].clientX - startX;
    if (Math.abs(diff) > 50) flipCard();
});

let hasAnimated = false;

function flipCard() {
    card.classList.toggle("flipped");

    if (!hasAnimated && card.classList.contains("flipped")) {
        typePoem();
        hasAnimated = true;
    }
}

// Handwritten typing effect
const poemText = `Mom, you’ve got a book always open in hand,
true crime twists from some dark little land.

Coffee in cup like a spell you brew tight,
fueling your mornings from morning to night.

A little bit smoky, a little bit chill,
you read every page like you’re solving a kill.

From late-night plots to your well-earned grace,
you’ve always made space in the wildest place.

We went off-script, had distance and time,
but somehow we found our way back into rhyme.

Now stronger than ever, no need to pretend,
you’re my mom, my safe place, my best kind of friend.`;

function typePoem() {
    let i = 0;
    let speed = 28;

    function type() {
        if (i < poemText.length) {
            poemEl.innerHTML = poemText.substring(0, i) + '<span class="cursor"></span>';
            i++;
            setTimeout(type, speed);
        } else {
            poemEl.innerHTML = poemText;
        }
    }

    type();
}
</script>

</body>
</html>
